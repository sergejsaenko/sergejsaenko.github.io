<div class="login-wrapper" *transloco="let t">
  <div class="login-card">
    <h2>{{ isSignUp() ? t('auth.login.signup_title') : t('auth.login.title') }}</h2>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="username">{{ t('auth.login.username') }}</label>
        <input
          id="username"
          type="text"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label for="password">{{ t('auth.login.password') }}</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? t('auth.login.loading') : (isSignUp() ? t('auth.login.signup_submit') : t('auth.login.submit')) }}
      </button>
    </form>


    <p class="toggle-link" (click)="toggleMode()">
      {{ isSignUp() ? t('auth.login.already_registered') : t('auth.login.no_account') }}
    </p>
  </div>
</div>
