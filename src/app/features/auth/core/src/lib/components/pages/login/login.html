<div class="login-wrapper" *transloco="let t">
  <div class="login-card">
    <h2>{{ isSignUp() ? t('auth.login.signup_title') : t('auth.login.title') }}</h2>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="username">{{ t('auth.login.username') }}</label>
        <input
          id="username"
          type="text"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          (focus)="usernameFocused.set(true)"
          (blur)="usernameFocused.set(false)"
          name="username"
          autocomplete="username"
          required
        />
        @if (usernameFocused()) {
          <span class="field-hint">{{ t('auth.login.usernameHint') }}</span>
        }
      </div>

      <div class="field">
        <label for="password">{{ t('auth.login.password') }}</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (focus)="passwordFocused.set(true)"
          (blur)="passwordFocused.set(false)"
          name="password"
          autocomplete="current-password"
          required
        />
        @if (passwordFocused()) {
          <span class="field-hint">{{ t('auth.login.passwordHint') }}</span>
        }
      </div>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? t('auth.login.loading') : (isSignUp() ? t('auth.login.signup_submit') : t('auth.login.submit')) }}
      </button>
    </form>

    <p class="toggle-link" (click)="toggleMode()">
      {{ isSignUp() ? t('auth.login.already_registered') : t('auth.login.no_account') }}
    </p>
  </div>
</div>
