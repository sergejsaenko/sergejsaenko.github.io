<nav>
  <div class="logo">
    <span routerLink="/">Scaffiz</span>
  </div>
  @if (!isMobile) {
    <ul class="nav-links">
      @if (auth.isGuest()) {
        <li routerLink="/login">Login</li>
      } @else {
        <li (click)="logout()">Logout</li>
      }
    </ul>
  }
  @if (isMobile) {
    <div class="burger" [class.toggle]="menuOpen" (click)="toggleMenu()">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>
  }
</nav>

<!-- Mobile menu overlay -->
@if (menuOpen) {
  <div class="header-container" (click)="closeMenuOnOverlay($event)">
    <ul class="nav-links">
      @if (auth.isGuest()) {
        <li routerLink="/login" (click)="closeMenu()">Login</li>
      } @else {
        <li (click)="logout()">Logout</li>
      }
    </ul>
  </div>
}
